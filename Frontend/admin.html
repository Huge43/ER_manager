<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Admin - Elite Runners</title>
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title" style="color: #4ade80;">Accès Direction</h1>
            <p class="login-subtitle">Portail sécurisé Elite Runners</p>

            <form id="adminLoginForm">
                <div class="input-wrapper">
                    <input type="email" id="adminEmail" placeholder="E-mail Administrateur" required>
                </div>

                <div class="input-wrapper">
                    <input type="password" id="adminPassword" placeholder="Mot de passe" required>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" id="adminLoginBtn" class="submit-btn">
                    Accéder au Dashboard
                </button>
            </form>
            
            <p class="login-footer">
                Retour au <a href="index.html">portail des membres</a>.
            </p>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
