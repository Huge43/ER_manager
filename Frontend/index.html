<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
     <link rel="stylesheet" href="styles.css">

    <title>ER Manager</title>
</head>
<body>
    <section class="login">
         <div class="login__content">
            <div>
               <h2 class="login__title">Bienvenue sur l'espace membre ER</h2>
      
               <form action="" method="post" class="login__form">
                  <div class="login__group">
                     <div class="login__box">
                        <i class="ri-mail-fill login__icon"></i>
                        <input type="email" name="email" autocomplete="email" required placeholder=" " class="login__input" id="email">
                        <label for="email" class="login__label">Email</label>
                     </div>
                     
                     <div class="login__box">
                        <i class="ri-phone-fill login__icon"></i>
                        
                        <input type="tel" name="telephone" autocomplete="tel" required placeholder=" " class="login__input" id="telephone">
                        
                        <label for="telephone" class="login__label">Téléphone</label>
                     </div>
                  </div>
   
                  
   
                  <button type="submit" class="login__button">
                     Se connecter<i class="ri-send-plane-2-fill"></i>
                  </button>
   
                  
               </form>
            </div>

            <div class="login__image">
               <img src="image.png" alt="" class="login__img">
            </div>
         </div>
      </section>
      <script src="login.js"></script>
</body>
</html>
